<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Analysis 2026-05-06</title>
  <style>
html {
  overflow: hidden;
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
}

body {
  background-image: linear-gradient(#E0E0E0, #ffffff, #ffffff, #ffffff, #ffffff, #E0E0E0);
  margin: 0;
  margin-left: 0.5vw;
  padding: 0;
  font-family: Verdana, sans-serif;
  color: #222222;
  width: 100%;
  height: 100%;
  -webkit-font-smoothing: antialiased;
}

table { border-collapse: collapse; }
table, td, th { border: 1px solid lightgray; padding: 2px; text-align: left; }
textarea.highlight { border-color: #fe990b; background-color: #f9d380; }

/* Advanced filter panel as modal */
.flt-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 99;
}

.flt-backdrop.active {
  display: block;
}

.flt-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  width: 90%;
  max-width: 800px;
  max-height: 80vh;
  padding: 1.5rem;
  border: 1px solid #999;
  background-color: #fff;
  border-radius: 6px;
  font-family: monospace;
  font-size: 12px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  z-index: 100;
  overflow-y: auto;
}

.flt-panel.active {
  display: block;
}

.flt-bar {
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid #999;
}

.flt-bar button {
  margin-right: 0.5rem;
  padding: 2px 8px;
  font-size: 11px;
  cursor: pointer;
}

.flt-badge {
  display: inline-block;
  margin-left: 1rem;
  padding: 2px 6px;
  background-color: #fa4;
  border-radius: 3px;
  font-weight: bold;
}

.flt-group {
  margin-bottom: 1rem;
  padding: 0.5rem;
  border: 1px solid #ccc;
  background-color: #fff;
  border-radius: 3px;
}

.flt-group-hdr {
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.flt-group-hdr strong {
  flex: 1;
}

.flt-group-hdr button {
  padding: 2px 6px;
  font-size: 10px;
  cursor: pointer;
}

.flt-condition {
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.flt-cond {
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.flt-condition select,
.flt-condition input {
  padding: 2px 4px;
  font-size: 11px;
  border: 1px solid #aaa;
}

.flt-condition button {
  padding: 2px 6px;
  font-size: 10px;
  cursor: pointer;
}

.flt-footer {
  text-align: right;
  margin-top: 1rem;
  padding-top: 0.5rem;
  border-top: 1px solid #ccc;
}

.flt-footer button {
  padding: 4px 12px;
  font-size: 11px;
  cursor: pointer;
}

</style>
  </head>

<body id="BODY">

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 1 — LOAD SCREEN
       Visible on startup. Hidden by BuildInit() once data loads.
  ════════════════════════════════════════════════════════════ -->
  <div id="IDparameter">
    <!-- Populated by BuildInit():
         - Logo (DAlogo)
         - File picker input
         - Column separator input
         - Decimal notation toggle
         - Preview checkbox
         - Toolbar (IDload) once data is ready        -->
    <pre id="IDload" style="display:inline;"></pre>
  </div>

  <!-- Status / info line (file name, row count, timing) -->
  <pre id="IDinfo" style="display:inline;"></pre>

  <!-- Output area: progress bar during load,
       Update button on paste screen              -->
  <pre id="IDoutput" style="width:99vw;"></pre>

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 2 — DATA PREVIEW / EDIT
       Shown when "preview data" is checked or Edit Data clicked.
       Hidden while in graphic mode.
  ════════════════════════════════════════════════════════════ -->
  <pre id="IDpreview" style="width:99vw; overflow:scroll; display:none;"> </pre>

  <!-- Paste textarea + instruction text (load screen only) -->
  <pre id="IDdata"></pre>

  <!-- ═══════════════════════════════════════════════════════════
       SCREEN 3 — GRAPHIC / ANALYSIS
       Table layout: [spacer] [histogram] [drag handle] [chart] [spacer]
       Hidden until first CalcGraphic() call.
  ════════════════════════════════════════════════════════════ -->
  <div id="IDgraphicwrap">
    <table id="IDgraphic" style="padding:0; margin:0; border-collapse:collapse; display:none;">
      <tr>
        <!-- Left spacer — used during resize -->
        <td style="padding:0;">
          <div id="IDL" style="width:0; display:inline-block;"> </div>
        </td>

        <!-- Histogram panel -->
        <td style="padding:0;">
          <div id="IDhstbox">
            <div id="IDhst" style="display:inline-block;"></div>
          </div>
        </td>

        <!-- Drag handle between histogram and chart -->
        <td style="padding:0;">
          <div id="IDCbox" style="width:5px; height:100px; display:flex;
                                  justify-content:center; align-items:center;">
            <div id="IDC" style="margin:0; border-right:2px solid gray;
                                 border-left:2px solid gray; height:50px;
                                 display:inline-block; cursor:col-resize;"></div>
          </div>
        </td>

        <!-- Main chart -->
        <td style="padding:0;">
          <div id="IDgrpbox">
            <div id="IDgrp" style="display:inline-block;"></div>
          </div>
        </td>

        <!-- Right spacer -->
        <td style="padding:0;">
          <div id="IDR" style="width:0; display:inline-block;"> </div>
        </td>
      </tr>
    </table>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       DETAIL / STATUS LINE
       Shows trendline equation, FWHM, filter row count,
       date detection debug output, error count link.
  ════════════════════════════════════════════════════════════ -->
  <pre style="margin:3pt;">
    <div id="IDDETAIL" style="display:inline;"></div>
  </pre>

  <!-- Recorder action bar — shown after data load, populated by _renderRecBar() -->
  <div id="IDRECBAR" style="margin:3pt; font-size:12px; display:none;"></div>

  <!-- Copyright notice — populated by BuildInit() -->
  <pre></pre><pre id="IDCOPY" style="margin:3pt;"></pre>

  <!-- ═══════════════════════════════════════════════════════════
       PIE CHART MODAL
       Hidden by default. Opened by Action("piechart").
       Closed by clicking the backdrop.
  ════════════════════════════════════════════════════════════ -->
  <div id="IDpiebackdrop" style="display:none; position:fixed; inset:0;
       background:rgba(0,0,0,0.5); z-index:100;"
       onclick="closePieModal(event)">
    <div id="IDpiemodal" style="position:relative; background:#fff;
         margin:5vh auto; width:90vw; height75vh; max-width:1400px;
         border-radius:6px; padding:1rem; overflow:hidden;">
      <button onclick="closePieModal()"
              style="position:absolute;top:8px;right:8px;border:none;background:transparent;
                     font-size:20px;cursor:pointer;line-height:1;">&#x2715;</button>
      <div id="IDpiectrl" style="display:flex;align-items:center;flex-wrap:wrap;
           gap:8px;margin-bottom:8px;padding-right:28px;"></div>
      <div id="piechart" style="width:100%; height:80vh;"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       CALCULATED COLUMN MODAL
       Hidden by default. Opened by OpenCalcModal() from edit.js.
       Closed by clicking the backdrop or pressing Escape.
  ════════════════════════════════════════════════════════════ -->
  <div id="IDcalcbackdrop" style="display:none;" onclick="_cmBackdropClick(event)">
    <div id="IDcalcmodal"></div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       EXCEL WORKSHEET SELECTOR
       Shown only when an XLSX file with multiple sheets is loaded.
       Populated and revealed by ParsExcel().
  ════════════════════════════════════════════════════════════ -->
  <div id="IDexcelwrap" style="display:none; margin:0.5rem 0;">
    <label for="IDexcelwb" style="font-size:12px;">Worksheet:</label>
    <select id="IDexcelwb" style="font-size:12px;"
            onchange="ParsExcel()"></select>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       THIRD-PARTY LIBRARIES
       Load order matters:
         1. Plotly  (chart rendering)
         2. JSZip   (DZIP container read/write)
         3. XLSX    (Excel file parsing)
  ════════════════════════════════════════════════════════════ -->
  <script src="https://cdn.plot.ly/plotly-basic-2.35.2.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/3.7.1/dom-to-image-more.min.js"></script>
